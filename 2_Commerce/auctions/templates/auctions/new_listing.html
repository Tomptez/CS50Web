{% extends "auctions/layout.html" %}
{% load static %}

{% block body %}
{% if user.is_authenticated %}
    <h2>Create a listing</h2>
    <form class="form" action="{% url 'addlisting' %}" method="post">
        {% csrf_token %}
        {{ form }}
        <input class="btn btn-primary" type="submit">
    </form>
{% else %}
Please log in to create a listing
{% endif %}

{% endblock %}
