{% extends "encyclopedia/layout.html" %}

{% block title %}
    Search results
{% endblock %}

{% block body %}
    <h1>Search results</h1>

    <ul>
        {% for entrytitle in entries %}
            <li><a href="{% url 'entry' title=entrytitle %}">{{ entrytitle }}</a></li>
        {% endfor %}
        {% if not entries %}
            <i>Unfortunately, your search vielded no results.</i>
        {% endif %}
    </ul>

{% endblock %}
